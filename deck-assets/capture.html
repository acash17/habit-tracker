<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cadence — capture</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F1E8; --paper-2: #EFE8DA; --card: #FBF7EE;
    --ink: #1F1B16; --terra: #C26A38; --sage: #6B8E5A; --lav: #8E7CB8;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: #1F1B16; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(800px 600px at 50% 50%, #2a241c, #1F1B16 70%);
  }
  #phone-mount { transform: scale(0.62); transform-origin: center center; }
  @keyframes slideup { from { transform: translateY(20px); opacity: 0; } to   { transform: translateY(0); opacity: 1; } }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 0.25; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes wave { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.2); } }
  @keyframes confetti-fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:0;} 10%{opacity:1;} 100%{transform:translateY(280px) rotate(720deg);opacity:0;} }
  * { box-sizing: border-box; }
</style>
</head>
<body>
  <div id="phone-mount"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../src/ios-frame.jsx"></script>
  <script type="text/babel" src="../src/data.jsx"></script>
  <script type="text/babel" src="../src/ui.jsx"></script>
  <script type="text/babel" src="../src/screen-today.jsx"></script>
  <script type="text/babel" src="../src/screen-goals.jsx"></script>
  <script type="text/babel" src="../src/screen-insights.jsx"></script>
  <script type="text/babel" src="../src/screen-settings.jsx"></script>
  <script type="text/babel" src="../src/screen-newgoal.jsx"></script>
  <script type="text/babel" src="../src/sheet-life-happened.jsx"></script>
  <script type="text/babel" src="../src/sheet-voice.jsx"></script>
  <script type="text/babel" src="../src/sheet-library.jsx"></script>
  <script type="text/babel" src="../src/sheet-energy.jsx"></script>
  <script type="text/babel" src="../src/onboarding.jsx"></script>
  <script type="text/babel" src="../src/planner.jsx"></script>
  <script type="text/babel" src="../src/app.jsx"></script>

  <script type="text/babel">
    // Skip onboarding for captures
    try { localStorage.setItem('cadence-onboarded', '1'); } catch {}
    function Mount() {
      return (
        <IOSDevice width={402} height={874}>
          <App/>
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('phone-mount')).render(<Mount/>);
  </script>
</body>
</html>
