name: Build Signed Android App Bundle (AAB)

# Triggers:
#   - Push of a tag matching v* (e.g. v0.5.1) — produces a release AAB
#   - Manual via Actions tab
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions → New repository secret):
#   KEYSTORE_BASE64           — output of `base64 -w0 cadence-release.keystore`
#   KEYSTORE_PASSWORD         — store password
#   KEY_ALIAS                 — usually `cadence`
#   KEY_PASSWORD              — key password (same as store unless you set different)
#
# If any secret is missing the job skips signing and exits.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify keystore secrets present
        id: check
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret missing — cannot build signed AAB."
            exit 1
          fi
          echo "ok=true" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          mkdir -p $RUNNER_TEMP/keys
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/keys/cadence-release.keystore
          echo "Decoded keystore size: $(stat -c%s $RUNNER_TEMP/keys/cadence-release.keystore) bytes"

      - name: Vite build
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build release AAB
        working-directory: android
        env:
          CADENCE_KEYSTORE_PATH:     ${{ runner.temp }}/keys/cadence-release.keystore
          CADENCE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CADENCE_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          CADENCE_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadence-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90
